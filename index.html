<html lang="pt-BR">

    <title>INTERPOL - Prova Oficial 2026</title>

    <div class="container">

        <h1>PROVA OFICIAL DE SELEÇÃO<br>AGENTE ESPECIAL - 2026</h1>

        <div class="warning">⚠️ ACESSO RESTRITO - NÍVEL SIGILOSO ⚠️</div>

</button>

            <h2>QUESTÃO ÚNICA - VALE 100 PONTOS</h2>
            <p class="questao"><strong>É feijão e o que?</strong></p>
            
            <input type="text" id="resposta" placeholder="Digite sua resposta aqui..." autocomplete="off">
            <br>
            <button id="btnResponder">ENVIAR RESPOSTA</button>

            <div id="resultado" class="resultado"></div>
        </div>

        <p style="margin-top:40px; font-size:16px; opacity:0.8;">
            Atenção: a prova contém áudio confidencial. Use fone de ouvido.
        </p>
    </div>
    
<audio id="audioProva" preload="auto">
        <source src="audio_feijao.mp3" type="audio/mpeg">
        </audio>
