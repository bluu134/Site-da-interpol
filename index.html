<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTERPOL - Prova Oficial 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="logo">INTERPOL</div>
        <h1>PROVA OFICIAL DE SELEÇÃO<br>AGENTE ESPECIAL - 2026</h1>

        <div class="warning">⚠️ ACESSO RESTRITO - NÍVEL SIGILOSO ⚠️</div>

        <button id="btnAcessar">ACESSAR A PROVA</button>

        <div id="provaDiv">
            <div id="botoesEscondidos" style="margin-bottom: 20px;">
                <button id="btnVideo">🎥 ASSISTIR VÍDEO SECRETO</button>
                <button id="btnOuvirAudio">🔊 OUVIR ÁUDIO SECRETO</button>
            </div>

            <div id="imagemCerta" style="margin-top:20px;"></div>
            <h2>QUESTÃO ÚNICA - VALE 100 PONTOS</h2>
            <p class="questao"><strong>É feijão e o que?</strong></p>
            
            <input type="text" id="resposta" placeholder="Digite sua resposta aqui..." autocomplete="off">
            <br>
            <button id="btnResponder">ENVIAR RESPOSTA</button>

            <div id="resultado" class="resultado"></div>
        </div>

        

        <p style="margin-top:40px; font-size:16px; opacity:0.8;">
            feito por: Luis Henrique Hammel
        </p>
    </div>
    
    <audio id="audioProva" preload="auto">
        <source src="audio_feijao.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
